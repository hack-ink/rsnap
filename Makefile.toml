# Rust workspace tasks.

# Lint
# | task            | type      | cwd |
# | --------------- | --------- | --- |
# | lint            | composite |     |
# | lint-fix        | composite |     |
# | lint-rust       | command   |     |
# | lint-fix-rust   | extend    |     |
# | lint-vstyle     | command   |     |
# | lint-fix-vstyle | command   |     |

[tasks.lint]
workspace = false
dependencies = [
	"lint-rust",
	"lint-vstyle",
]

[tasks.lint-fix]
workspace = false
dependencies = [
	"lint-fix-rust",
	"lint-fix-vstyle",
]

[tasks.lint-rust]
workspace = false
command = "cargo"
args = [
	"clippy",
	"--all-features",
	"--all-targets",
	"--workspace",
	"--",
	"-D",
	"clippy::all",
	"-D",
	"clippy::too_many_lines",
	"-D",
	"clippy::unwrap_used",
	"-D",
	"clippy::use_self",
	"-D",
	"clippy::wildcard_imports",
	"-D",
	"missing-docs",
	"-D",
	"unused-crate-dependencies",
	"-D",
	"warnings",
]

[tasks.lint-fix-rust]
extend = "lint-rust"
args = [
	"clippy",
	"--fix",
	"--allow-dirty",
	"--all-features",
	"--all-targets",
	"--workspace",
	"--",
	"-D",
	"clippy::all",
	"-D",
	"clippy::too_many_lines",
	"-D",
	"clippy::unwrap_used",
	"-D",
	"clippy::use_self",
	"-D",
	"clippy::wildcard_imports",
	"-D",
	"missing-docs",
	"-D",
	"unused-crate-dependencies",
	"-D",
	"warnings",
]

[tasks.lint-vstyle]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"curate",
	"--workspace",
	"--all-features"
]

[tasks.lint-fix-vstyle]
workspace = false
command = "cargo"
args = [
	"vstyle",
	"tune",
	"--workspace",
	"--all-features",
	"--strict",
]


# Test
# | task      | type      | cwd |
# | --------- | --------- | --- |
# | test      | composite |     |
# | test-rust | command   |     |

[tasks.test]
workspace = false
dependencies = [
	"test-rust",
]

[tasks.test-rust]
workspace = false
command = "cargo"
args = [
	"nextest",
	"run",
	"--workspace",
	"--all-targets",
	"--all-features",
]


# Smoke
# | task                         | type      | cwd |
# | ---------------------------- | --------- | --- |
# | smoke-macos                  | composite |     |
# | smoke-self-check-macos       | composite |     |
# | smoke-scroll-capture-macos   | command   |     |
# | smoke-live-loupe-perf-macos  | command   |     |
# | smoke-scroll-capture-self-check-macos | command | |
# | smoke-live-loupe-self-check-macos     | command | |

[tasks.smoke-macos]
workspace = false
dependencies = [
	"smoke-live-loupe-perf-macos",
	"smoke-scroll-capture-macos",
]

[tasks.smoke-self-check-macos]
workspace = false
dependencies = [
	"smoke-live-loupe-self-check-macos",
	"smoke-scroll-capture-self-check-macos",
]

[tasks.smoke-scroll-capture-macos]
workspace = false
command = "scripts/scroll-capture-smoke-macos.sh"

[tasks.smoke-live-loupe-perf-macos]
workspace = false
command = "scripts/live-loupe-perf-smoke-macos.sh"

[tasks.smoke-scroll-capture-self-check-macos]
workspace = false
command = "scripts/scroll-capture-smoke-macos.sh"
args = ["--self-check"]

[tasks.smoke-live-loupe-self-check-macos]
workspace = false
command = "scripts/live-loupe-perf-smoke-macos.sh"
args = ["--self-check"]


# Performance
# | task                          | type      | cwd |
# | ----------------------------- | --------- | --- |
# | perf-local                    | composite |     |
# | perf-macos                    | composite |     |
# | perf-self-check-macos         | composite |     |
# | perf-bench-settings-window    | command   |     |
# | perf-bench-scroll-capture     | command   |     |

[tasks.perf-local]
workspace = false
dependencies = [
	"perf-bench-settings-window",
	"perf-bench-scroll-capture",
]

[tasks.perf-macos]
workspace = false
dependencies = [
	"perf-local",
	"smoke-macos",
]

[tasks.perf-self-check-macos]
workspace = false
dependencies = [
	"perf-local",
	"smoke-self-check-macos",
]

[tasks.perf-bench-settings-window]
workspace = false
command = "cargo"
args = [
	"bench",
	"-p",
	"rsnap",
	"--bench",
	"settings_window",
	"--",
	"--sample-size",
	"10",
	"--warm-up-time",
	"0.1",
	"--measurement-time",
	"0.1",
]

[tasks.perf-bench-scroll-capture]
workspace = false
command = "cargo"
args = [
	"bench",
	"-p",
	"rsnap-overlay",
	"--bench",
	"scroll_capture",
	"--",
	"--sample-size",
	"10",
	"--warm-up-time",
	"0.1",
	"--measurement-time",
	"0.1",
]


# Format
# | task           | type      | cwd |
# | -------------- | --------- | --- |
# | fmt            | composite |     |
# | fmt-check      | composite |     |
# | fmt-rust       | command   |     |
# | fmt-rust-check | extend    |     |
# | fmt-toml       | command   |     |
# | fmt-toml-check | extend    |     |

[tasks.fmt]
workspace = false
dependencies = [
	"fmt-rust",
	"fmt-toml",
]

[tasks.fmt-check]
workspace = false
dependencies = [
	"fmt-rust-check",
	"fmt-toml-check",
]

[tasks.fmt-rust]
workspace = false
script = "cargo +nightly fmt --all"

[tasks.fmt-rust-check]
extend = "fmt-rust"
script = "cargo +nightly fmt --all -- --check"

[tasks.fmt-toml]
workspace = false
command = "taplo"
args = [
	"fmt",
]

[tasks.fmt-toml-check]
extend = "fmt-toml"
args = [
	"fmt",
	"--check",
]


# Meta
# | task   | type      | cwd |
# | ------ | --------- | --- |
# | checks | composite |     |

[tasks.checks]
workspace = false
dependencies = [
	"lint",
	"test",
	"fmt-check",
]
