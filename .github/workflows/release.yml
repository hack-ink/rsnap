name: Release

permissions:
  contents: write

env:
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  CARGO_TERM_COLOR: always

  RUST_BACKTRACE: full

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  build:
    name: Build ${{ matrix.target.name }} package
    runs-on: ${{ matrix.target.os }}
    strategy:
      matrix:
        target:
          [
            { name: aarch64-apple-darwin, os: macos-latest },
            { name: x86_64-unknown-linux-gnu, os: ubuntu-latest },
            { name: x86_64-pc-windows-msvc, os: windows-latest },
          ]
    steps:
      - name: Fetch latest code
        uses: actions/checkout@v6

      - name: Install Linux desktop build dependencies
        if: matrix.target.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libegl-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libxcb1-dev \
            libxdo-dev \
            libxrandr-dev

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          components: rustfmt, clippy

      - name: Add target
        run: rustup target add ${{ matrix.target.name }}

      - name: Install cargo-bundle (macOS)
        if: matrix.target.os == 'macos-latest'
        run: cargo install cargo-bundle --locked

      - name: Build
        if: matrix.target.os != 'macos-latest'
        run: cargo build --profile final-release --locked --target ${{ matrix.target.name }}

      - name: Bundle, sign, notarize, and pack (macOS)
        if: matrix.target.os == 'macos-latest'
        env:
          APPLE_CERTIFICATE_P12_BASE64: ${{ secrets.APPLE_CERTIFICATE_P12_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER: ${{ secrets.APPLE_NOTARY_ISSUER }}
          APPLE_NOTARY_KEY_P8: ${{ secrets.APPLE_NOTARY_KEY_P8 }}
          RSNAP_BUNDLE_PROFILE: final-release
          RSNAP_BUNDLE_TARGET: ${{ matrix.target.name }}
        run: |
          for required_secret in \
            APPLE_CERTIFICATE_P12_BASE64 \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_SIGNING_IDENTITY \
            APPLE_NOTARY_KEY_ID \
            APPLE_NOTARY_KEY_P8; do
            if [[ -z "${!required_secret:-}" ]]; then
              echo "Missing required secret: ${required_secret}" >&2
              exit 1
            fi
          done

          CERT_PATH="${RUNNER_TEMP}/apple-cert.p12"
          KEYCHAIN_PATH="${RUNNER_TEMP}/build.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 16)"
          NOTARY_KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_NOTARY_KEY_ID}.p8"

          CERT_PATH="${CERT_PATH}" python - <<'PY'
          import base64
          import os
          from pathlib import Path
          Path(os.environ["CERT_PATH"]).write_bytes(
              base64.b64decode(os.environ["APPLE_CERTIFICATE_P12_BASE64"])
          )
          PY

          printf '%s' "${APPLE_NOTARY_KEY_P8}" > "${NOTARY_KEY_PATH}"

          security create-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security set-keychain-settings -lut 21600 "${KEYCHAIN_PATH}"
          security unlock-keychain -p "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security import "${CERT_PATH}" \
            -k "${KEYCHAIN_PATH}" \
            -P "${APPLE_CERTIFICATE_PASSWORD}" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "${KEYCHAIN_PATH}"
          security default-keychain -d user -s "${KEYCHAIN_PATH}"
          security set-key-partition-list -S apple-tool:,apple: -s -k "${KEYCHAIN_PASSWORD}" "${KEYCHAIN_PATH}"
          security find-identity -v -p codesigning "${KEYCHAIN_PATH}"

          ./scripts/bundle-macos.sh

          APP_PATH="target/${{ matrix.target.name }}/final-release/bundle/osx/Rsnap.app"
          if [[ ! -d "${APP_PATH}" ]]; then
            echo "Failed to find bundled app at ${APP_PATH}" >&2
            exit 1
          fi

          codesign \
            --force \
            --options runtime \
            --timestamp \
            --sign "${APPLE_SIGNING_IDENTITY}" \
            "${APP_PATH}"
          codesign --verify --deep --strict --verbose=2 "${APP_PATH}"

          NOTARY_ZIP="${RUNNER_TEMP}/rsnap-notary.zip"
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "${NOTARY_ZIP}"

          NOTARY_ARGS=(
            submit
            "${NOTARY_ZIP}"
            --wait
            --timeout 30m
            --key "${NOTARY_KEY_PATH}"
            --key-id "${APPLE_NOTARY_KEY_ID}"
          )
          if [[ -n "${APPLE_NOTARY_ISSUER:-}" ]]; then
            NOTARY_ARGS+=(--issuer "${APPLE_NOTARY_ISSUER}")
          fi
          xcrun notarytool "${NOTARY_ARGS[@]}"

          xcrun stapler staple "${APP_PATH}"
          spctl -a -vvv --type exec "${APP_PATH}"

          ditto -c -k --sequesterRsrc --keepParent \
            "${APP_PATH}" \
            "rsnap-${{ matrix.target.name }}.zip"

      - name: Pack (Windows)
        if: matrix.target.os == 'windows-latest'
        run: |
          mv target/${{ matrix.target.name }}/final-release/rsnap.exe .
          Compress-Archive -Path rsnap.exe -DestinationPath rsnap-${{ matrix.target.name }}.zip

      - name: Pack (Linux)
        if: matrix.target.os == 'ubuntu-latest'
        run: |
          mv target/${{ matrix.target.name }}/final-release/rsnap .
          tar -czvf rsnap-${{ matrix.target.name }}.tar.gz rsnap

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: rsnap-${{ matrix.target.name }}
          path: rsnap-${{ matrix.target.name }}.*
          retention-days: 1

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8

      - name: Hash
        run: |
          mkdir -p artifacts
          mv rsnap-*/* artifacts/
          cd artifacts
          sha256sum * | tee ../SHA256
          md5sum * | tee ../MD5
          mv ../SHA256 .
          mv ../MD5 .

      - name: Publish
        uses: softprops/action-gh-release@v2
        with:
          discussion_category_name: Announcements
          generate_release_notes: true
          files: artifacts/*

  publish-on-crates-io:
    name: Publish on crates.io
    runs-on: ubuntu-latest
    steps:
      - name: Fetch latest code
        uses: actions/checkout@v6

      - name: Install Linux desktop build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libegl-dev \
            libgtk-3-dev \
            libpipewire-0.3-dev \
            libwayland-dev \
            libxcb1-dev \
            libxdo-dev \
            libxrandr-dev

      - name: Set up Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
          components: rustfmt, clippy

      - name: Login
        run: cargo login ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish rsnap-overlay
        run: |
          cargo publish -p rsnap-overlay --locked

      - name: Wait for rsnap-overlay publication
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for _ in $(seq 1 24); do
            if curl -fsSL "https://crates.io/api/v1/crates/rsnap-overlay/${VERSION}" > /dev/null; then
              exit 0
            fi
            sleep 20
          done
          echo "Timed out waiting for rsnap-overlay ${VERSION} on crates.io"
          exit 1

      - name: Publish rsnap
        run: |
          cargo publish -p rsnap --locked
